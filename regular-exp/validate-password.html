<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #form-data{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 0.5em;
            border: none;
            background: linear-gradient();
        }
        .error{
            color: red;
        }
    </style>
</head>
<body>
    <form id="form-data">
        <label for="email">Email: <input type="email" name="email" id="email"></label>
        <span class="error" id="email-error"></span>
        <label for="password">Password: <input type="password" name="password" id="password"></label>
        <span class="error" id="password-error"></span>
        <button type="submit">submit</button>
        <p id="para"></p>
        <script>
            const form=document.getElementById("form-data");
            const email=document.getElementById("email");
            const emailError=document.getElementById("email-error");
            const password=document.getElementById("password");
            const passwordError=document.getElementById("password-error");
            email.addEventListener("input",()=>{
                const regex=/[\w.-]+@[\w.-]+\.\w+$/;
                if(!regex.test(email.value)){
                    emailError.textContent="invalid email format";
                }
                else{
                    emailError.textContent="";
                }
            })
            password.addEventListener("input",()=>{
                const value=password.value;
                const hasUpper =/[A-Z]/.test(value);
                const hasLower =/[a-z]/.test(value);
                const hasNumber = /[0-9]/.test(value);
                const hasSpecial = /[^A-Za-z0-9]/.test(value);

                let errors=[];
                if(!hasUpper) errors.push("1 uppercase");
                if(!hasLower) errors.push("1 lowercase");
                if(!hasNumber) errors.push("1 number");
                if(!hasSpecial) errors.push("1 special character");
                if(errors.length > 0){
                    passwordError.textContent="passwprd must contain: "+ errors.join(", ");
                }
                else{
                    passwordError.textContent="Strong password";
                }
            })
            form.addEventListener("submit",function(e){
                e.preventDefault();
                const formdata=new FormData(form);
                const userdetails={};
                formdata.forEach((value,key)=>{
                    userdetails[key]=value;
                })
                if(!emailError.textContent && !passwordError.textContent){
                    document.getElementById("para").textContent=JSON.stringify(userdetails);
                }
                form.reset();
                passwordError.textContent="";
            })

        </script>
    </form>

</body>
</html>
